<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buku Kita</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body class="login-body">
    <!-- Form login -->
    <div
      class="container vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="form-login p-4">
        <h2 class="text-center mb-2" style="color: #0d6efd">Buat akun</h2>

        <div class="mb-2">
          <label class="form-label">Username</label>
          <input
          id="name"
            type="text"
            class="form-control"
            placeholder="Masukkan username"
          />
        </div>

        <div class="mb-2">
          <label class="form-label">Email</label>
          <input
          id="email"
            type="text"
            class="form-control"
            placeholder="Masukkan email"
          />
        </div>

        <div class="mb-2">
          <label class="form-label">Password</label>
          <input
          id="password"
            type="password"
            class="form-control"
            placeholder="Masukkan password"
          />
        </div>

        <div class="mb-2">
          <label class="form-label">Konfirmasi Password</label>
          <input
          id="confirmPassword"
            type="password"
            class="form-control"
            placeholder="Masukkan password"
          />
        </div>

        <button onclick="handleRegister()"; class="btn btn-primary w-100 mb-2" href="dashboard.html">
          Daftar
        </button>
        <p class="d-flex gap-1 justify-content-end">
          <a class="text-decoration-none" href="index.html">Login</a>
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/javascript/script.js"></script>
  </body>
</html>
