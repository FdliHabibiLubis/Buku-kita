<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buku Kita</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body class="login-body">
    <!-- Form login -->
    <div
      class="container vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="form-login p-4">
        <h2 class="text-center mb-2" style="color: #0d6efd">Lupa password</h2>

        <div class="mb-2">
          <label class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            placeholder="Masukkan username/Email"
          />
        </div>
        <button class="btn btn-success w-100">Kirim OTP</button>

        <div class="mb-2">
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            placeholder="Masukkan password"
          />
        </div>

        <div class="mb-2">
          <label class="form-label">Konfirmasi Password</label>
          <input
            type="password"
            class="form-control"
            placeholder="Masukkan password"
          />
        </div>

        <button class="btn btn-primary w-100 mb-2">Reset Password</button>
        <p class="d-flex justify-content-end"><a class="text-decoration-none" href="index.html">Login</a></p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
